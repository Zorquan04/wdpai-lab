<!doctype html>
<html lang="en">
  <head>
    <?php include __DIR__ . '/partials/head.html'; ?>
    <title><?= $title; ?></title>
  </head>
  <body>
    <?php include __DIR__ . '/partials/nav.html'; ?>
    
    <div class="container layout">
      <main>
        <h2><i class="fa-solid fa-layer-group"></i> My Library (<?= count($library) ?>)</h2>
        
        <?php if(empty($library)): ?>
            <p class="text-muted">Your library is empty. Go to the <a href="/">Store</a> to add some games!</p>
        <?php else: ?>
            <div class="game-grid">
                <?php foreach($library as $game): ?>
                    <a href="/game/<?= $game['game_id'] ?>" style="text-decoration: none; color: inherit; display: block;">
                        <div class="game-card">
                            <img src="/public/resources/covers/<?= htmlspecialchars($game['graphics'] ?? 'default.jpg'); ?>" class="game-cover" alt="<?= htmlspecialchars($game['title']); ?>">
                            
                            <h2><?= htmlspecialchars($game['title']); ?></h2>
                            <div class="game-category"><?= htmlspecialchars($game['category']); ?></div>
                            
                            <div class="game-price-row">
                                <span class="text-muted" style="font-size: 0.85rem;">Added: <?= date('d M Y', strtotime($game['purchased_at'])) ?></span>
                                <button onclick="event.preventDefault(); alert('Starting game...');">Play</button>
                            </div>
                        </div>
                    </a>
                <?php endforeach; ?>
            </div>
        <?php endif; ?>
      </main>
    </div>
  </body>
</html>
